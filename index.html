<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Board Automation | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-left">
            <button id="btn-cms" class="active">CMS Editor</button>
            <button id="btn-display">Monitor Display</button>
        </div>
        <div class="nav-right" id="display-controls" style="display: none;">
            <select id="active-monitor-select" class="monitor-dropdown"></select>
            <button id="btn-fullscreen" class="accent-btn">⛶ Fullscreen View</button>
        </div>
    </nav>

    <section id="cms-view" class="view-section active">
        <div class="cms-container">
            <div class="sidebar">
                <h2>System Settings</h2>
                
                <div class="setting-group">
                    <label>Active Monitor</label>
                    <select id="cms-monitor-select"></select>
                    <button id="add-monitor-btn" class="secondary-btn">+ New Monitor</button>
                </div>

                <div class="setting-group">
                    <label>Monitor Layout Style</label>
                    <select id="layout-select">
                        <option value="layout-1-sidebar-grid">Layout 1: Vertical Sidebar Grid (Image_0, Image_3)</option>
                        <option value="layout-2-red-panels">Layout 2: Red Header Panels (Image_1, Image_2)</option>
                        <option value="layout-3-minimalist">Layout 3: Minimalist 3-Column</option>
                        <option value="layout-4-masonry-hybrid">Layout 4: Masonry Hybrid (Adaptive)</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Global Background</label>
                    <input type="color" id="color-bg" value="#0f0f11">
                    <label>Primary (RU Text / Accents)</label>
                    <input type="color" id="color-primary" value="#ffffff">
                    <label>Secondary (KK Text / Price)</label>
                    <input type="color" id="color-secondary" value="#ff4500">
                </div>

                <div class="setting-group">
                    <label>Typography</label>
                    <select id="font-select">
                        <option value="'Inter', sans-serif">Inter (Modern)</option>
                        <option value="'Montserrat', sans-serif">Montserrat (Bold)</option>
                    </select>
                </div>
                
                <button id="add-category-btn" class="primary-btn">+ Add Dish Group</button>
                <button id="save-data-btn" class="success-btn">Save Changes</button>
                <button id="reset-data-btn" class="danger-btn" style="width:100%; margin-top:1rem; opacity:0.6;">Reset Dummy Data</button>
            </div>

            <div class="content-editor" id="categories-container">
                </div>
        </div>
    </section>

    <section id="display-view" class="view-section">
        <div id="menu-board" class="menu-board">
            </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
